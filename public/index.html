<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Week 7 Mini App - Users</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<header class="bg-primary text-white text-center py-4">
  <div class="container">
    <h1 class="h3 mb-0 fw-bold">Week 7 Mini App</h1>
    <p class="lead mb-0 mt-2 opacity-75">User Management System</p>
  </div>
</header>

<main class="container py-4">
  <div class="row g-4">
    <div class="col-lg-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title">Add User</h5>
          <form id="userForm">
            <div class="mb-2">
              <label class="form-label">Name</label>
              <input class="form-control" name="name" required>
            </div>
            <div class="mb-2">
              <label class="form-label">Email</label>
              <input class="form-control" name="email" type="email" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Age (optional)</label>
              <input class="form-control" name="age" type="number" min="1">
            </div>
            <button class="btn btn-primary w-100" type="submit">Save</button>
          </form>
          <div id="msg" class="mt-3"></div>
        </div>
      </div>
    </div>

    <div class="col-lg-7">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title">User List</h5>
          <div id="userList" class="list-group small"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="/js/app.js"></script>

<footer class="text-center custom-footer">
  <div class="container">
    <p class="copyright">&copy; 2026 Ivan Jacob Milan. All Rights Reserved.</p>
  </div>
</footer>

</body>
</html>
